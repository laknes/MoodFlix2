<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moodflix - AI Movie Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700;900&display=swap" rel="stylesheet">
    
    <script>
      window.process = { env: { API_KEY: "" } };
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: { 'netflix-red': '#E50914' },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'aura': 'aura 25s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 3s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              aura: {
                '0%, 100%': { transform: 'translate(0, 0) scale(1) rotate(0deg)' },
                '33%': { transform: 'translate(50px, -70px) scale(1.1) rotate(10deg)' },
                '66%': { transform: 'translate(-40px, 30px) scale(0.9) rotate(-10deg)' },
              }
            }
          }
        }
      }
    </script>

    <style>
      :root {
        --bg-color: #020202;
        --bg-gradient: radial-gradient(circle at 50% -20%, #1a0505 0%, #020202 100%);
        --glass-bg: rgba(255, 255, 255, 0.015);
        --glass-border: rgba(255, 255, 255, 0.05);
      }
      
      body {
        font-family: 'Vazirmatn', sans-serif;
        background-color: var(--bg-color);
        background-image: var(--bg-gradient);
        transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        color: #f8fafc;
      }

      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(32px) saturate(180%);
        -webkit-backdrop-filter: blur(32px) saturate(180%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 20px 50px 0 rgba(0, 0, 0, 0.5);
      }

      .premium-glass {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .netflix-logo {
        font-weight: 900;
        letter-spacing: -2px;
        text-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
      }
      
      .gradient-text {
        background: linear-gradient(to bottom right, #ffffff 40%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .animate-fade-in {
        animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .noise-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        opacity: 0.02;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(229, 9, 20, 0.3); border-radius: 10px; }
    </style>

    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "recharts": "https://esm.sh/recharts@3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "http": "https://esm.sh/http@^0.0.1-security",
    "fs": "https://esm.sh/fs@^0.0.1-security",
    "path": "https://esm.sh/path@^0.12.7",
    "url": "https://esm.sh/url@^0.11.4"
  }
}
</script>
  </head>
  <body>
    <div class="noise-overlay"></div>
    <div id="root"></div>
    <!-- Use text/babel to handle JSX on the fly in browser -->
    <script type="text/babel" data-type="module" src="index.tsx"></script>
  </body>
</html>
